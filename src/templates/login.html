<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập Hệ thống</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #003a6a; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { width: 400px; padding: 30px; border-radius: 15px; background: white; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <h3 class="mb-4 text-primary fw-bold">HCM-UTE PORTAL</h3>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-danger p-2">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        <form method="POST" action="/">
            <div class="mb-3 text-start">
                <label class="form-label fw-bold">Mã Người Dùng</label>
                <input type="text" name="username" class="form-control" placeholder="VD: 24110200" required>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label fw-bold">Mật khẩu</label>
                <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu..." required>
            </div>
            <button type="submit" class="btn btn-warning w-100 fw-bold">Đăng Nhập</button>
        </form>
    </div>
</body>
</html>
